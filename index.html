 <!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شركة أبراج الكباري العقارية</title>

<style>

body{
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;

    background-image:url("myphoto.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    min-height:100vh;
}

/* طبقة شفافة */
.overlay{
    background:rgba(0,0,0,0.6);
    min-height:100vh;
    padding-bottom:50px;
}

/* المحتوى الرئيسي */

.content{
    padding-top:120px;
    padding-right:20px;
    padding-left:20px;
}

.content h1{
    font-size:55px;
    color:gold;
}

.content p{
    font-size:24px;
    max-width:700px;
    margin:auto;
}

/* الزر */

button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:10px;
    background:gold;
    font-size:20px;
    cursor:pointer;
}

/* المشاريع */

.projects{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:50px 20px;
}

.card{
    background:rgba(255,255,255,0.1);
    width:280px;
    border-radius:15px;
    overflow:hidden;
    backdrop-filter:blur(5px);
    box-shadow:0 0 15px rgba(0,0,0,0.5);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card h2{
    color:gold;
    margin-top:15px;
}

.card p{
    padding:0 15px 20px;
    font-size:18px;
}

/* واتساب */

.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;

    background:green;
    color:white;

    width:60px;
    height:60px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:30px;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="overlay">

    <div class="content">

        <h1>🏙 شركة أبراج الكباري العقارية</h1>

        <p>
            استثمر في أفضل الشقق والأبراج الفاخرة بأحدث التصاميم والمواقع المميزة
        </p>

        <button>استكشف المشاريع</button>

    </div>

    <section class="projects">

        <div class="card">
            <img src="tower1.jpg">

            <h2>🏢 برج النخبة</h2>

            <p>
                شقق فاخرة بإطلالة رائعة وخدمات متكاملة.
            </p>
        </div>

        <div class="card">
            <img src="tower2.jpg">

            <h2>🌆 أبراج صنعاء</h2>

            <p>
                مشروع استثماري حديث في أفضل المواقع.
            </p>
        </div>

        <div class="card">
            <img src="tower3.jpg">

            <h2>🏠 شقق الرويال</h2>

            <p>
                تصاميم عصرية ومساحات متعددة تناسب الجميع.
            </p>
        </div>

    </section>

</div>

<a class="whatsapp" href="https://wa.me/967000000000">
📞
</a>

</body>
</html>
